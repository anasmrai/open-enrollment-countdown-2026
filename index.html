<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Enrollment Countdown</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow: hidden;
    background: #050f22;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  #oe-scale-shell {
    width: 1100px;
    transform-origin: top center;
  }

  #oe-digital-countdown-widget {
    --navy: #050f22;
    --cyan: #25dfff;
    --amber: #ffb342;
    --white: #f7fbff;
    --muted: #b9c9dc;
    --panel: rgba(5, 18, 38, .92);

    font-family: Arial, Helvetica, sans-serif;
    color: var(--white);
    width: 1100px;
    max-width: 1100px;
    margin: 0;
    padding: 20px 26px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 24%, rgba(37,223,255,.16), transparent 28%),
      radial-gradient(circle at 84% 72%, rgba(255,179,66,.18), transparent 32%),
      linear-gradient(135deg, #020814 0%, #050f22 45%, #030a16 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }

  #oe-digital-countdown-widget * {
    box-sizing: border-box;
  }

  #oe-digital-countdown-widget::before,
  #oe-digital-countdown-widget::after {
    content: "";
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    filter: blur(16px);
    opacity: .5;
    pointer-events: none;
  }

  #oe-digital-countdown-widget::before {
    left: -90px;
    top: -70px;
    background: radial-gradient(circle, rgba(37,223,255,.25), transparent 62%);
  }

  #oe-digital-countdown-widget::after {
    right: -90px;
    bottom: -70px;
    background: radial-gradient(circle, rgba(255,179,66,.22), transparent 62%);
  }

  .oe-header {
    text-align: center;
    position: relative;
    z-index: 1;
    margin-bottom: 18px;
  }

  .oe-title {
    margin: 0;
    text-transform: uppercase;
    font-size: 58px;
    line-height: .92;
    letter-spacing: .03em;
    font-weight: 800;
  }

  .oe-title .cyan {
    color: transparent;
    -webkit-text-stroke: 2px var(--cyan);
    text-shadow: 0 0 16px rgba(37,223,255,.75), 0 0 36px rgba(37,223,255,.35);
  }

  .oe-title .amber {
    color: transparent;
    -webkit-text-stroke: 2px var(--amber);
    text-shadow: 0 0 16px rgba(255,179,66,.72), 0 0 36px rgba(255,179,66,.35);
  }

  .oe-subtitle {
    margin: 10px auto 0;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: .22em;
    font-size: 16px;
    font-weight: 700;
    text-shadow: 0 0 16px rgba(37,223,255,.6);
  }

  .oe-divider {
    width: 480px;
    height: 2px;
    margin: 12px auto 0;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--amber), transparent);
    box-shadow: 0 0 12px rgba(37,223,255,.5), 0 0 12px rgba(255,179,66,.45);
  }

  .oe-begins-label {
    position: relative;
    z-index: 1;
    text-align: center;
    margin: 0 auto 10px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: .16em;
    font-size: 18px;
    font-weight: 800;
    text-shadow: 0 0 14px rgba(255,179,66,.62);
  }

  .oe-countdown-panel {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 14px 16px;
    border: 2px solid transparent;
    border-radius: 24px;
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(90deg, var(--cyan), var(--amber)) border-box;
    box-shadow:
      0 0 24px rgba(37,223,255,.16),
      0 0 24px rgba(255,179,66,.12),
      inset 0 0 0 1px rgba(255,255,255,.05);
  }

  .oe-countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .oe-time-box {
    min-height: 92px;
    padding: 10px 6px 8px;
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(10,36,70,.86), rgba(4,14,30,.95));
    border: 1px solid rgba(255,255,255,.08);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 24px rgba(37,223,255,.06), 0 10px 20px rgba(0,0,0,.24);
  }

  .oe-time-box:nth-child(3),
  .oe-time-box:nth-child(4) {
    box-shadow: inset 0 0 24px rgba(255,179,66,.08), 0 10px 20px rgba(0,0,0,.24);
  }

  .oe-value,
  .oe-seconds-value {
    font-family: 'Courier New', Courier, monospace;
    font-size: 42px;
    line-height: .95;
    font-weight: 700;
    letter-spacing: -.05em;
    font-variant-numeric: tabular-nums;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .oe-value {
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(37,223,255,.88), 0 0 30px rgba(37,223,255,.35);
  }

  .oe-time-box:nth-child(3) .oe-value,
  .oe-seconds-value {
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255,179,66,.88), 0 0 30px rgba(255,179,66,.35);
  }

  .oe-ecg-box {
    position: relative;
    overflow: hidden;
  }

  .oe-ecg-wrap {
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    width: 100%;
  }

  .oe-ecg-svg {
    width: 110px;
    height: 22px;
    overflow: visible;
    filter: drop-shadow(0 0 8px rgba(255,179,66,.7));
  }

  .oe-ecg-line {
    fill: none;
    stroke: var(--amber);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 280;
    stroke-dashoffset: 280;
    animation: oeEcgPulse 1s linear infinite;
  }

  @keyframes oeEcgPulse {
    0% { stroke-dashoffset: 280; opacity: .35; }
    12% { opacity: 1; }
    60% { stroke-dashoffset: 0; opacity: 1; }
    100% { stroke-dashoffset: -280; opacity: .35; }
  }

  .oe-label {
    display: block;
    margin-top: 8px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: .18em;
    font-size: 10px;
    font-weight: 700;
  }

  .oe-status {
    color: var(--amber);
    text-align: center;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: .12em;
    font-size: 11px;
    font-weight: 800;
    min-height: 14px;
  }

  .oe-date-window {
    position: relative;
    z-index: 1;
    width: fit-content;
    max-width: 100%;
    margin: 16px auto 10px;
    padding: 8px 36px;
    border: 2px solid transparent;
    border-radius: 16px;
    background:
      linear-gradient(#06162d, #06162d) padding-box,
      linear-gradient(90deg, var(--cyan), var(--amber)) border-box;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: .05em;
    text-transform: uppercase;
    box-shadow: 0 0 16px rgba(37,223,255,.16), 0 0 16px rgba(255,179,66,.12);
    text-align: center;
  }

  .oe-date-window .start {
    color: var(--cyan);
    text-shadow: 0 0 14px rgba(37,223,255,.6);
  }

  .oe-date-window .end {
    color: var(--amber);
    text-shadow: 0 0 14px rgba(255,179,66,.55);
  }

  .oe-date-window .dash {
    color: var(--white);
    margin: 0 .25em;
  }

  .oe-copy {
    position: relative;
    z-index: 1;
    text-align: center;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: .14em;
    font-size: 11px;
    font-weight: 700;
    margin: 0 auto 14px;
  }

  .oe-icons {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 620px;
    margin: 0 auto;
    text-align: center;
  }

  .oe-icon-item {
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 12px;
    font-weight: 800;
  }

  .oe-icon-circle {
    width: 38px;
    height: 38px;
    margin: 0 auto 8px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    color: var(--cyan);
    box-shadow: 0 0 14px rgba(37,223,255,.22);
  }

  .oe-icon-item:nth-child(4) .oe-icon-circle {
    color: var(--amber);
    box-shadow: 0 0 14px rgba(255,179,66,.22);
  }

  .oe-footer {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 14px auto 0;
    padding: 6px 12px;
    border: 1px solid rgba(255,179,66,.75);
    border-radius: 999px;
    text-align: center;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .10em;
    font-size: 10px;
    font-weight: 700;
  }
</style>
</head>

<body>
  <div id="oe-scale-shell">
    <div id="oe-digital-countdown-widget">
      <div class="oe-header">
        <h1 class="oe-title"><span class="cyan">Open</span> <span class="amber">Enrollment</span></h1>
        <div class="oe-subtitle">Employee Benefits</div>
        <div class="oe-divider"></div>
      </div>

      <div class="oe-begins-label" id="oeBeginsLabel">Enrollment Begins In</div>

      <div class="oe-countdown-panel" role="timer" aria-live="polite">
        <div class="oe-countdown-grid">
          <div class="oe-time-box">
            <div class="oe-value" id="oeDays">00</div>
            <span class="oe-label">Days</span>
          </div>
          <div class="oe-time-box">
            <div class="oe-value" id="oeHours">00</div>
            <span class="oe-label">Hours</span>
          </div>
          <div class="oe-time-box">
            <div class="oe-value" id="oeMinutes">00</div>
            <span class="oe-label">Minutes</span>
          </div>
          <div class="oe-time-box oe-ecg-box">
            <div class="oe-seconds-value" id="oeSeconds">00</div>
            <div class="oe-ecg-wrap" aria-label="Live ECG pulse animation">
              <svg class="oe-ecg-svg" viewBox="0 0 220 90" aria-hidden="true">
                <path class="oe-ecg-line" d="M5 50 H42 L55 50 L66 28 L82 72 L96 50 H120 L132 50 L144 38 L158 58 L170 50 H215"></path>
              </svg>
            </div>
            <span class="oe-label">Seconds</span>
          </div>
        </div>
        <div class="oe-status" id="oeStatus"></div>
      </div>

      <div class="oe-date-window">
        <span class="start">June 1</span><span class="dash">–</span><span class="end">June 12</span>
      </div>

      <p class="oe-copy">Time to review and update your benefits</p>

      <div class="oe-icons">
        <div class="oe-icon-item"><div class="oe-icon-circle">✚</div>Medical</div>
        <div class="oe-icon-item"><div class="oe-icon-circle">🦷</div>Dental</div>
        <div class="oe-icon-item"><div class="oe-icon-circle">◉</div>Vision</div>
        <div class="oe-icon-item"><div class="oe-icon-circle">♥</div>Life</div>
      </div>

      <div class="oe-footer">For more information contact HR@building-controls.com</div>
    </div>
  </div>

<script>
(function () {
  var enrollmentStart = new Date('2026-06-01T00:00:00');
  var enrollmentEnd = new Date('2026-06-12T23:59:59');

  var daysEl = document.getElementById('oeDays');
  var hoursEl = document.getElementById('oeHours');
  var minutesEl = document.getElementById('oeMinutes');
  var secondsEl = document.getElementById('oeSeconds');
  var statusEl = document.getElementById('oeStatus');
  var labelEl = document.getElementById('oeBeginsLabel');

  function pad(value) {
    return String(value).padStart(2, '0');
  }

  function renderTime(distance) {
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    var minutes = Math.floor((distance / (1000 * 60)) % 60);
    var seconds = Math.floor((distance / 1000) % 60);

    daysEl.textContent = pad(days);
    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);
  }

  function updateCountdown() {
    var now = new Date();

    if (now < enrollmentStart) {
      labelEl.textContent = 'Enrollment Begins In';
      statusEl.textContent = '';
      renderTime(enrollmentStart - now);
      return;
    }

    if (now >= enrollmentStart && now <= enrollmentEnd) {
      labelEl.textContent = 'Enrollment Is Now Open';
      statusEl.textContent = 'Enrollment window is open through June 12';
      renderTime(enrollmentEnd - now);
      return;
    }

    labelEl.textContent = 'Enrollment Window Closed';
    statusEl.textContent = 'The enrollment period has ended';
    daysEl.textContent = '00';
    hoursEl.textContent = '00';
    minutesEl.textContent = '00';
    secondsEl.textContent = '00';
  }

  function scaleWidget() {
    var shell = document.getElementById('oe-scale-shell');
    var widget = document.getElementById('oe-digital-countdown-widget');
    if (!shell || !widget) return;

    var designWidth = 1100;
    var scaleMultiplier = 1;
    var scale = Math.min(window.innerWidth / designWidth, 1) * scaleMultiplier;
    var height = widget.scrollHeight * scale;

    shell.style.transform = 'scale(' + scale + ')';
    shell.style.height = height + 'px';
    document.body.style.height = height + 'px';
    document.documentElement.style.height = height + 'px';
  }

  updateCountdown();
  scaleWidget();
  setInterval(updateCountdown, 1000);
  window.addEventListener('load', scaleWidget);
  window.addEventListener('resize', scaleWidget);
  setTimeout(scaleWidget, 300);
})();
</script>
</body>
</html>
